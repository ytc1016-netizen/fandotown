<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>案件列表</title>

<style>
body{
  font-family:Arial;
  background:#f5f6fa;
}

.container{
  max-width:900px;
  margin:auto;
  margin-top:40px;
}

.card{
  background:white;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="container">
  <h2>案件列表</h2>
  <div id="list"></div>
</div>

<script>

let list = JSON.parse(localStorage.getItem('cases')) || [];

let html = "";

list.forEach(item=>{
  html += `
    <div class="card">
      <h3>${item.title}</h3>
      <p>價格：${item.price} 萬</p>
      <p>土地：${item.land} 坪</p>
    </div>
  `;
});

document.getElementById('list').innerHTML = html;

</script>

</body>
</html>
