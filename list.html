<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>案件列表</title>

<style>
body{
  font-family: Arial;
  background:#f5f6fa;
  margin:0;
}

.container{
  max-width:1000px;
  margin:40px auto;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.title{
  font-size:18px;
  font-weight:bold;
}

.price{
  color:#e17055;
  font-size:20px;
  margin-top:5px;
}

.meta{
  color:#666;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>案件列表</h2>

  <div id="list"></div>
</div>

<script>

let list = JSON.parse(localStorage.getItem('cases')) || [];

let html = "";

list.forEach(item => {
  html += `
    <div class="card">
      <div class="title">${item.title || "未命名案件"}</div>
      <div class="price">${item.price || 0} 萬</div>
      <div class="meta">土地：${item.land || 0} 坪</div>
      <div class="meta">刊登時間：${item.time}</div>
    </div>
  `;
});

document.getElementById('list').innerHTML = html;

</script>

</body>
</html>
