<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>案件列表</title>

<style>
body{
  font-family: Arial;
  background:#f5f6fa;
  margin:0;
}

.container{
  max-width:1000px;
  margin:40px auto;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.title{
  font-size:18px;
  font-weight:bold;
}

.price{
  color:#e17055;
  font-size:20px;
  margin-top:5px;
}

.meta{
  color:#666;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>案件列表</h2>

  <div id="list"></div>
</div>

<script>

function save(){

  let id = new URLSearchParams(location.search).get('id');

  let data = {
    id: id ? Number(id) : Date.now(), // ⭐唯一ID
    title: document.getElementById('title').value,
    price: document.getElementById('price').value,
    land: document.getElementById('landSize').value,
    time: new Date().toLocaleString()
  };

  let list = JSON.parse(localStorage.getItem('cases')) || [];

  if(id){
    // 編輯模式
    list = list.map(item => item.id == id ? data : item);
  }else{
    // 新增
    list.push(data);
  }

  localStorage.setItem('cases', JSON.stringify(list));

  alert("已儲存！");
  window.location.href = "list.html";
}
