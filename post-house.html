<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<title>刊登房屋</title>

<style>

body{
font-family:Arial;
width:600px;
margin:auto;
margin-top:40px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:10px 20px;
background:#1976b6;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h1>刊登房屋</h1>

標題
<input id="title">

價格(萬)
<input id="price">

坪數
<input id="size">

格局
<input id="layout">

城市
<input id="city">

圖片URL
<input id="img">

<br><br>

<button onclick="addHouse()">刊登房屋</button>

<script>

function addHouse(){

let houses = JSON.parse(localStorage.getItem("houses")) || [];

let house = {

title:document.getElementById("title").value,
price:document.getElementById("price").value,
size:document.getElementById("size").value,
layout:document.getElementById("layout").value,
city:document.getElementById("city").value,
img:document.getElementById("img").value

};

houses.push(house);

localStorage.setItem("houses",JSON.stringify(houses));

alert("刊登成功");

location.href="house-list.html";

}

</script>

</body>
</html>
