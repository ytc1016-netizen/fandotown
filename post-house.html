<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<title>刊登房屋</title>

<style>

body{
font-family:Arial;
width:600px;
margin:auto;
margin-top:40px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:10px 20px;
background:#1976b6;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h1>刊登房屋</h1>

標題
<input id="title">

價格(萬)
<input id="price">

坪數
<input id="size">

格局
<input id="layout">

城市
<input id="city">

圖片URL
<input id="img">

<br><br>

<button onclick="addHouse()">刊登房屋</button>

<script>
<script>

function postHouse(){

const title = document.getElementById("title").value
const price = document.getElementById("price").value
const size = document.getElementById("size").value
const layout = document.getElementById("layout").value
const city = document.getElementById("city").value
const img = document.getElementById("img").value

let houses = JSON.parse(localStorage.getItem("houses")) || []

const house = {
id: Date.now(),
title,
price,
size,
layout,
city,
img
}

houses.push(house)

localStorage.setItem("houses", JSON.stringify(houses))

alert("刊登成功")

window.location.href="house-list.html"

}

</script>


</script>

</body>
</html>
