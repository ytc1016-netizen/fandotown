<!DOCTYPE html>

location.href="map-search.html";

<html>
<head>
<meta charset="UTF-8">
<title>刊登房屋</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
margin-top:30px;
border-radius:10px;
}

h1{
text-align:center;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
margin-top:20px;
padding:12px;
background:#0077cc;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>刊登房屋</h1>

<label>物件標題</label>
<input id="title">

<label>交易類型</label>
<select id="trade">
<option>出售</option>
<option>出租</option>
<option>預售屋</option>
</select>

<label>物件種類</label>
<select id="type">

<option>店面</option>
<option>透天</option>
<option>別墅</option>
<option>大樓</option>
<option>套房</option>
<option>車位</option>
<option>土地</option>

</select>

<label>縣市</label>
<input id="city">

<label>行政區</label>
<input id="district">

<label>路/街</label>
<input id="road">

<label>巷</label>
<input id="lane">

<label>弄</label>
<input id="alley">

<label>號</label>
<input id="number">

<label>樓</label>
<input id="floor">

<label>總價 (萬)</label>
<input id="price">

<label>總坪數</label>
<input id="area">

<label>格局 (例:3房2廳2衛)</label>
<input id="layout">

<label>是否有車位</label>
<select id="parking">

<option>無</option>
<option>坡道平面</option>
<option>機械車位</option>

</select>

<label>管理費</label>
<input id="manage">

<label>建築完成日期</label>
<input id="year" placeholder="例:2015/05/01 或 無">

<label>特色說明 (80字)</label>
<textarea id="feature" maxlength="80"></textarea>

<label>照片 (最多12張)</label>
<input type="file" id="images" multiple>

<button onclick="postHouse()">刊登房屋</button>

</div>

<script>

function postHouse(){

let house={

title:document.getElementById("title").value,
trade:document.getElementById("trade").value,
type:document.getElementById("type").value,
city:document.getElementById("city").value,
district:document.getElementById("district").value,
road:document.getElementById("road").value,
price:document.getElementById("price").value,
area:document.getElementById("area").value,
layout:document.getElementById("layout").value

};

let houses=JSON.parse(localStorage.getItem("houses")) || [];

houses.push(house);

localStorage.setItem("houses",JSON.stringify(houses));

alert("刊登成功");

location.href="map-search.html";
}

</script>

</body>
</html>
