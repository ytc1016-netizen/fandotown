<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>刊登房屋</title>

<style>

body{
font-family:Arial;
width:700px;
margin:auto;
margin-top:40px;
}

input,textarea,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:12px 25px;
background:#1976b6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>刊登房屋</h1>
  
<select id="usage">
<option>住宅</option>
<option>商業</option>
<option>工業</option>
<option>農地</option>
<option>建地</option>
</select>
  
<h3>基本資料</h3>

標題
<input id="title">

價格(萬)
<input id="price">

坪數
<input id="size">

房
<input id="rooms">

廳
<input id="living">

衛
<input id="bath">

  物件類型
<select id="type">
<option>公寓</option>
<option>電梯大樓</option>
<option>華廈</option>
<option>透天</option>
<option>別墅</option>
<option>套房</option>
<option>店面</option>
<option>辦公室</option>
<option>土地</option>
<option>預售屋</option>
</select>
  
城市
<select id="city">
<option>台北市</option>
<option>新北市</option>
<option>桃園市</option>
<option>台中市</option>
<option>台南市</option>
<option>高雄市</option>
</select>

樓層
<input id="floor">

總樓層
<input id="total_floor">

屋齡
<input id="age">

介紹
<textarea id="desc"></textarea>

<h3>照片</h3>

圖片1
<input id="img1">

圖片2
<input id="img2">

圖片3
<input id="img3">

<h3>聯絡資訊</h3>

聯絡人
<input id="contact">

電話
<input id="phone">

<button onclick="postHouse()">刊登房屋</button>

<script>

function postHouse(){

let houses = []

try{
houses = JSON.parse(localStorage.getItem("houses")) || []
}catch(e){
houses = []
}

const house = {

id: Date.now(),

type:document.getElementById("type").value,

title:document.getElementById("title").value,
price:document.getElementById("price").value,
size:document.getElementById("size").value,

rooms:document.getElementById("rooms").value,
living:document.getElementById("living").value,
bath:document.getElementById("bath").value,

city:document.getElementById("city").value,
floor:document.getElementById("floor").value,
total_floor:document.getElementById("total_floor").value,
age:document.getElementById("age").value,

desc:document.getElementById("desc").value,

img:document.getElementById("img1").value,
img2:document.getElementById("img2").value,
img3:document.getElementById("img3").value,

contact:document.getElementById("contact").value,
phone:document.getElementById("phone").value

}

houses.push(house)

localStorage.setItem("houses",JSON.stringify(houses))

alert("刊登成功")

setTimeout(()=>{
window.location.href="house-list.html"
},200)

}

</script>
</body>
</html>
