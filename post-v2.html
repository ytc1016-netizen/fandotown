<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>刊登物件 V2（土地開發版）</title>

<style>
body {
  font-family: Arial;
  background:#f5f6fa;
  margin:0;
}

.container {
  max-width:900px;
  margin:40px auto;
  background:#fff;
  padding:30px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.step {
  display:none;
}

.step.active {
  display:block;
}

.progress {
  display:flex;
  margin-bottom:30px;
}

.progress div {
  flex:1;
  text-align:center;
  padding:10px;
  border-bottom:3px solid #ddd;
}

.progress .active {
  border-color:#6c5ce7;
  font-weight:bold;
}

input, select {
  width:100%;
  padding:10px;
  margin:8px 0 20px;
  border:1px solid #ccc;
  border-radius:6px;
}

button {
  padding:10px 20px;
  background:#6c5ce7;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.card {
  background:#fafafa;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
}

h3 {
  margin-top:0;
}
</style>
</head>

<body>

<div class="container">

  <!-- 進度條 -->
  <div class="progress">
    <div id="p1" class="active">1. 基本資料</div>
    <div id="p2">2. 詳細資料</div>
    <div id="p3">3. 投資分析</div>
  </div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <h2>快速上架</h2>

    <label>物件類型</label>
    <select id="type">
      <option>土地</option>
      <option>住宅</option>
    </select>

    <label>物件標題</label>
    <input id="title">

    <label>地區</label>
    <input id="area">

    <label>總價（萬）</label>
    <input id="price">

    <button onclick="next(2)">下一步</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
  <h2>詳細資料</h2>

  <div class="card">
    <h3>面積</h3>

    <label>土地面積（坪）</label>
    <div style="display:flex;">
      <input id="landSize" placeholder="例如：865.8" style="flex:1;">
      <span style="margin-left:10px;">坪</span>
    </div>
  </div>

  <div class="card">
    <h3>土地資訊</h3>

    <label>建蔽率（%）</label>
    <input id="coverage" placeholder="例如：60">

    <label>容積率（%）</label>
    <div style="display:flex;">
      <input id="far" placeholder="例如：200" style="flex:1;">
      <span style="margin-left:10px;">%</span>
    </div>

    <input id="width" placeholder="面寬">
    <input id="depth" placeholder="深度">
  </div>

  <button onclick="next(1)">返回</button>
  <button onclick="next(3)">下一步</button>
</div>

<div class="step" id="step3">
  <h2>投資分析</h2>

  <div class="card">
    <h3>開發試算</h3>

    <p>土地坪數：<span id="showLand"></span> 坪</p>
    <p>容積率：<span id="showFar"></span> %</p>

    <label>預估銷售單價（萬/坪）</label>
    <input id="sellPrice" placeholder="例如：8">

    <button onclick="calculate()">試算</button>

    <p id="result"></p>
  </div>

  <button onclick="next(2)">返回</button>
  <button onclick="save()">完成刊登</button>
</div>

     <div class="card">
      <h3>開發試算</h3>

     <label>土地坪數</label>
     <input id="landSize">

     <label>容積率</label>
     <input id="far" type="number" min="0" max="1000" step="1">

     <label>預估銷售單價</label>
     <input id="sellPrice" placeholder="例如：8">

 if(far > 500){
     alert("容積率數值異常，請確認");
}

      <button onclick="calculate()">試算</button>

      <p id="result"></p>
    </div>

    <button onclick="next(2)">返回</button>
    <button onclick="save()">完成刊登</button>
  </div>

<script>

function next(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('step'+n).classList.add('active');
if(n === 3){
  document.getElementById('showLand').innerText = document.getElementById('landSize').value;
  document.getElementById('showFar').innerText = document.getElementById('far').value;
}
  document.querySelectorAll('.progress div').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
}

function calculate(){
  let land = parseFloat(document.getElementById('landSize').value) || 0;
  let far = parseFloat(document.getElementById('far').value) || 0;
  let price = parseFloat(document.getElementById('sellPrice').value) || 0;

  if(land === 0 || far === 0 || price === 0){
    alert("請填寫完整數值");
    return;
  }

  let build = land * (far/100);
  let revenue = build * price;

  document.getElementById('result').innerHTML =
    "可蓋坪數：" + build.toFixed(1) + " 坪<br>" +
    "預估銷售額：" + revenue.toFixed(0) + " 萬";
}

function save(){

  let data = {
    title: document.getElementById('title').value,
    price: document.getElementById('price').value,
    land: document.getElementById('landSize').value,
    time: new Date().toLocaleString()
  };

  // 取出舊資料
  let list = JSON.parse(localStorage.getItem('cases')) || [];

  // 加入新資料
  list.push(data);

  // 存回去
  localStorage.setItem('cases', JSON.stringify(list));

  alert("刊登成功！");
  window.location.href = "list.html";
}

</script>

</body>
</html>
