<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>地圖找房</title>

<style>

body{
font-family:Arial;
margin:0;
}

header{
background:#0077cc;
color:white;
padding:15px;
text-align:center;
}

#map{
width:100%;
height:600px;
}

</style>

</head>

<body>

<header>

<h2>9168房都通｜地圖找房</h2>

</header>

<div id="map"></div>

<script>

function initMap(){

let center={lat:25.0330,lng:121.5654}

let map=new google.maps.Map(
document.getElementById("map"),
{
zoom:12,
center:center
}
)

let houses=[
{
title:"台北信義捷運宅",
price:"1680萬",
lat:25.0330,
lng:121.5654
},
{
title:"台中西屯三房",
price:"988萬",
lat:24.1710,
lng:120.6460
},
{
title:"高雄三民區電梯",
price:"798萬",
lat:22.6390,
lng:120.3020
}
]

houses.forEach(function(h){

let marker=new google.maps.Marker({
position:{lat:h.lat,lng:h.lng},
map:map
})

let info=new google.maps.InfoWindow({
content:"<b>"+h.title+"</b><br>"+h.price
})

marker.addListener("click",function(){

info.open(map,marker)

})

})

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

</body>
</html>
