<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>地圖找房</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

header{
background:#0077cc;
color:white;
padding:15px;
text-align:center;
}

#map{
height:600px;
}

</style>

</head>

<body>

<header>

<h2>9168房都通｜地圖找房</h2>

</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([25.0330,121.5654], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom:19
}).addTo(map);


var houses = [

{
title:"台北信義捷運宅",
price:"1680萬",
lat:25.0330,
lng:121.5654
},

{
title:"台中西屯三房",
price:"988萬",
lat:24.1710,
lng:120.6460
},

{
title:"高雄三民區電梯",
price:"798萬",
lat:22.6390,
lng:120.3020
}

];


houses.forEach(function(h){

var marker = L.marker([h.lat,h.lng]).addTo(map);

marker.bindPopup(
"<b>"+h.title+"</b><br>"+h.price
);

});

</script>

</body>
</html>
