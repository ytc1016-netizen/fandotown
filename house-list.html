<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>房屋清單</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#1976b6;
color:white;
padding:20px;
font-size:24px;
text-align:center;
}

.container{
width:1100px;
margin:auto;
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.info{
padding:15px;
}

.price{
color:#e53935;
font-size:20px;
font-weight:bold;
}

.title{
font-size:16px;
margin-top:5px;
}

.meta{
color:#666;
font-size:14px;
margin-top:5px;
}

</style>

</head>

<body>

<div class="header">房屋清單</div>

<div class="container" id="list"></div>

<script>

const houses = JSON.parse(localStorage.getItem("houses")) || []

const list = document.getElementById("list")

if(houses.length===0){
list.innerHTML="<h2>目前沒有房屋資料</h2>"
}

houses.forEach((h,i)=>{

list.innerHTML += `
<div class="card" onclick="openHouse(${i})">

<img src="${h.img || 'https://picsum.photos/400/300'}">

<div class="info">

<div class="price">${h.price} 萬</div>

<div class="title">${h.title}</div>

<div class="meta">${h.city} ｜ ${h.size} 坪</div>

</div>

</div>
`

})

function openHouse(i){

window.location.href="house-detail.html?id="+i

}

</script>

</body>
</html>
