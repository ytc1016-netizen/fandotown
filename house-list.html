<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>房屋列表</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>房屋列表</h1>
</header>

<div class="search">

<select id="city">
<option value="">全部城市</option>
<option>台北市</option>
<option>新北市</option>
<option>桃園市</option>
<option>台中市</option>
<option>台南市</option>
<option>高雄市</option>
</select>

<input id="price" placeholder="價格低於(萬)">

<button onclick="search()">搜尋</button>

</div>

<div id="houseList"></div>

<script>

let houses = JSON.parse(localStorage.getItem("houses")) || [];

function showHouse(list){

let html="";

list.forEach((h,i)=>{

html+=`
<div class="house">

<img src="${h.image}">

<h2>${h.title}</h2>

<p>價格：${h.price}萬</p>
<p>坪數：${h.size}坪</p>
<p>城市：${h.city}</p>

<a href="house-detail.html?id=${i}" class="btn">查看詳細</a>

</div>
`;

});

document.getElementById("houseList").innerHTML=html;

}

function search(){

let city=document.getElementById("city").value;
let price=document.getElementById("price").value;

let result=houses.filter(h=>{

if(city && h.city!=city) return false;
if(price && Number(h.price) > Number(price)) return false;

});

showHouse(result);

}

showHouse(houses);

</script>

</body>
</html>
