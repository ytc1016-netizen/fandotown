<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>預售屋3D預示</title>

<style>

.viewer{
perspective:1200px;
margin-top:30px;
}

.room-card{
transform-style:preserve-3d;
transition:transform 0.3s;
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

.container{
width:1000px;
margin:auto;
text-align:center;
padding-top:40px;
}

.viewer{

perspective:1200px;
margin-top:30px;

}

.room-card{

transform-style:preserve-3d;
transition:transform 0.6s;
}

.room-card:hover{

transform:rotateY(8deg) rotateX(3deg) scale(1.03);

}

.room-card img{

width:100%;
border-radius:12px;
box-shadow:0 20px 40px rgba(0,0,0,0.5);

}

.controls{

margin-top:30px;

}

button{

padding:12px 18px;
margin:5px;
border:none;
border-radius:8px;
background:white;
color:#333;
cursor:pointer;
font-size:14px;
transition:all .3s;

}

button:hover{

background:#ffcc00;
transform:translateY(-2px);

}

.title{

font-size:34px;
margin-bottom:10px;

}

.subtitle{

opacity:.8;
margin-bottom:20px;

}

</style>

</head>

<body>

<div class="container">

<div class="title">預售屋 3D 室內預示</div>
<div class="subtitle">切換不同設計風格</div>

<div class="viewer">

<div class="room-card">

<img id="room" src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1000">

</div>

<div class="controls">

<button onclick="changeStyle('empty')">空屋</button>

<button onclick="changeStyle('modern')">現代風</button>

<button onclick="changeStyle('nordic')">北歐風</button>

<button onclick="changeStyle('industrial')">工業風</button>

<button onclick="changeStyle('japan')">日式風</button>

<button onclick="fullscreen()">全螢幕</button>
  
</div>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search)
const id = urlParams.get("id")

const houses = JSON.parse(localStorage.getItem("houses")) || []

const house = houses[id]

if(house){

document.querySelector(".title").innerText = house.title

document.querySelector(".subtitle").innerText =
house.city + " ｜ " + house.size + "坪 ｜ " + house.price + "萬"

document.getElementById("room").src = house.img

}

function changeStyle(style){

let img = house.img

if(style=="modern"){
img = house.img2 || house.img
}

if(style=="nordic"){
img = house.img3 || house.img
}

document.getElementById("room").src = img

}

function fullscreen(){

const img = document.getElementById("room")

if(img.requestFullscreen){
img.requestFullscreen()

}
function fullscreen(){

const img = document.getElementById("room")

if(img.requestFullscreen){
img.requestFullscreen()
}

}

</script>

</body>
</html>
