<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>房都通</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#1976b6;
color:white;
padding:15px 30px;
font-size:22px;
}

nav{
display:flex;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
margin-top:30px;
}

.search{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

.search input,
.search select{
padding:10px;
margin-right:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#e53935;
font-size:20px;
font-weight:bold;
}

.title{
margin:5px 0;
}

.meta{
color:#777;
font-size:14px;
}

</style>

</head>

<body>

<header>
<nav>
<a href="index.html">首頁</a>
<a href="house-list.html">房屋</a>
<a href="map-search.html">地圖找房</a>
<a href="post-house.html">刊登房屋</a>
</nav>
</header>

<div class="container">

<div class="search">

<input placeholder="關鍵字">

<select>
<option>全部城市</option>
<option>台北市</option>
<option>新北市</option>
<option>台中市</option>
<option>高雄市</option>
</select>

<button>搜尋</button>

</div>

<div class="grid">

<div class="card">

<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">

<div class="card-body">

<div class="price">1680萬</div>

<div class="title">高雄美術館景觀宅</div>

<div class="meta">45坪｜3房2廳</div>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">

<div class="card-body">

<div class="price">1280萬</div>

<div class="title">農16精緻住宅</div>

<div class="meta">38坪｜2房2廳</div>

</div>

</div>

</div>

</div>

</body>
</html>
